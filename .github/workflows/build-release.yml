# Build the pinned upstream.ref version on push; use "Run workflow" to pick any version.
name: Build & Release Windows Installer

# Builds PluginLoader.exe + PluginLoader_noconsole.exe from upstream decky-loader,
# packages them into a single setup.exe (Inno Setup) that performs the full install,
# and publishes that installer as a GitHub Release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Decky version to build, e.g. 3.2.4 or 3.2.5-pre1 (blank = use upstream.ref). Leading 'v' optional."
        required: false
        default: ""
      publish:
        description: "Publish a GitHub Release with the installer"
        type: boolean
        default: true
  push:
    paths:
      - "upstream.ref"
      - "installer/**"
      - "lib/**"
      - "*.ps1"
      - ".github/workflows/build-release.yml"
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC - catches new upstream fixes

permissions:
  contents: write

jobs:
  build:
    name: Build installer on Windows
    runs-on: windows-2022
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Resolve upstream ref
        id: ref
        shell: bash
        run: |
          IN="${{ github.event.inputs.version }}"
          if [ -z "$IN" ]; then IN="$(tr -d '[:space:]' < upstream.ref)"; fi
          REF="$IN"
          case "$REF" in
            [0-9]*) REF="v$REF" ;;   # bare version (3.2.4) -> upstream tag form (v3.2.4)
          esac
          VERSION="${REF#v}"          # filename/display version: v3.2.4 -> 3.2.4
          case "$REF" in
            *-pre*|*-rc*|*-beta*|*-alpha*) PRE=true ;;
            *) PRE=false ;;
          esac
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRE" >> "$GITHUB_OUTPUT"
          echo "Building decky-loader $VERSION (git ref $REF, prerelease=$PRE)"

      - name: Checkout upstream decky-loader
        uses: actions/checkout@v4
        with:
          repository: SteamDeckHomebrew/decky-loader
          ref: ${{ steps.ref.outputs.ref }}
          path: upstream
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python 3.11.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.7"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: false

      - name: Install backend dependencies
        working-directory: upstream/backend
        run: |
          C:\Users\runneradmin\.local\bin\poetry self add "poetry-dynamic-versioning[plugin]"
          C:\Users\runneradmin\.local\bin\poetry install --no-interaction

      - name: Build frontend
        working-directory: upstream/frontend
        run: |
          npm i -g pnpm
          pnpm i --frozen-lockfile --dangerously-allow-all-builds
          pnpm run build

      - name: Build backend exes (console + noconsole)
        working-directory: upstream/backend
        shell: pwsh
        run: |
          C:\Users\runneradmin\.local\bin\poetry dynamic-versioning
          C:\Users\runneradmin\.local\bin\poetry run pyinstaller pyinstaller.spec
          $env:DECKY_NOCONSOLE = 1
          C:\Users\runneradmin\.local\bin\poetry run pyinstaller pyinstaller.spec

      - name: Stage built exes for the installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item upstream/backend/dist/PluginLoader.exe dist/ -Force
          Copy-Item upstream/backend/dist/PluginLoader_noconsole.exe dist/ -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ref.outputs.version }}" `
            installer\decky-loader-windows.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: decky-loader-${{ steps.ref.outputs.version }}-setup
          path: installer/Output/*.exe

      - name: Publish GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          # One release per upstream version. Rebuilding the same version replaces
          # its assets in place; a different version gets its own release.
          tag_name: win-${{ steps.ref.outputs.ref }}
          name: Decky Loader for Windows (${{ steps.ref.outputs.ref }})
          prerelease: ${{ steps.ref.outputs.prerelease }}
          body: |
            One-click Windows installer for Decky Loader, built from upstream
            decky-loader `${{ steps.ref.outputs.ref }}` by this repo's CI.

            **Download `decky-loader-${{ steps.ref.outputs.version }}-setup.exe` and run it.** It deploys
            the loader, enables Steam CEF remote debugging, and sets up autostart.
            Restart Steam afterwards and open the Quick Access menu.

            Raw binaries (`PluginLoader.exe`, `PluginLoader_noconsole.exe`) are
            attached for advanced/manual use.
          files: |
            installer/Output/*.exe
            dist/PluginLoader.exe
            dist/PluginLoader_noconsole.exe
          generate_release_notes: true
